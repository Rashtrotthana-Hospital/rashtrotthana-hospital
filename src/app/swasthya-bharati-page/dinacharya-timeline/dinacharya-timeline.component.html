<section class="dt-section" [class.dt-night]="isNight()">

  <!-- Sky crossfade layers -->
  <div class="dt-bg dt-bg--a" [style.background]="bgA()"></div>
  <div class="dt-bg dt-bg--b" [style.background]="bgB()" [style.opacity]="bgFade()"></div>
  <div class="dt-atm"></div>

  <!-- Stars (night only) -->
  <div class="dt-stars">
    @for (s of stars; track $index) {
    <span class="dt-star" [style.left.%]="s.left" [style.top.%]="s.top" [style.width.px]="s.size"
      [style.height.px]="s.size" [style.--dur]="s.dur+'s'" [style.--del]="s.delay+'s'"></span>
    }
  </div>

  <!-- Ambient particles -->
  <div class="dt-particles">
    @for (p of particles; track $index) {
    <span class="dt-particle" [style.left.%]="p.x" [style.top.%]="p.y" [style.width.px]="p.size"
      [style.height.px]="p.size" [style.--dur]="p.dur+'s'" [style.--del]="p.delay+'s'"></span>
    }
  </div>

  <!-- Section header -->
  <header class="dt-hdr">
    <p class="dt-eyebrow">Ritucharya · Rhythm of the seasons</p>
    <h2 class="dt-title">Six seasons, one rhythm of life.</h2>
  </header>

  <!-- ─── DESKTOP: single SVG arc layout ─── -->
  <svg class="dt-svg" [attr.viewBox]="'0 0 ' + VW + ' ' + VH" preserveAspectRatio="xMidYMid meet"
    xmlns="http://www.w3.org/2000/svg">

    <defs>
      <!-- Arc gradient: teal → violet → amber → steel-blue → crimson → navy -->
      <linearGradient id="dt-arc-g" x1="0" x2="1" y1="0" y2="0">
        <stop offset="0%"   stop-color="#48c890" />
        <stop offset="20%"  stop-color="#b870f8" />
        <stop offset="40%"  stop-color="#f8c832" />
        <stop offset="60%"  stop-color="#28c8f0" />
        <stop offset="80%"  stop-color="#e84878" />
        <stop offset="100%" stop-color="#6898f8" />
      </linearGradient>

      <!-- Per-card radial glows -->
      <radialGradient id="dt-cg-0" cx="50%" cy="100%" r="55%">
        <stop offset="0%" stop-color="#48c890" stop-opacity="0.38"/>
        <stop offset="100%" stop-color="#48c890" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="dt-cg-1" cx="50%" cy="100%" r="55%">
        <stop offset="0%" stop-color="#b870f8" stop-opacity="0.38"/>
        <stop offset="100%" stop-color="#b870f8" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="dt-cg-2" cx="50%" cy="100%" r="55%">
        <stop offset="0%" stop-color="#f8c832" stop-opacity="0.38"/>
        <stop offset="100%" stop-color="#f8c832" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="dt-cg-3" cx="50%" cy="100%" r="55%">
        <stop offset="0%" stop-color="#28c8f0" stop-opacity="0.38"/>
        <stop offset="100%" stop-color="#28c8f0" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="dt-cg-4" cx="50%" cy="100%" r="55%">
        <stop offset="0%" stop-color="#e84878" stop-opacity="0.38"/>
        <stop offset="100%" stop-color="#e84878" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="dt-cg-5" cx="50%" cy="100%" r="55%">
        <stop offset="0%" stop-color="#6898f8" stop-opacity="0.38"/>
        <stop offset="100%" stop-color="#6898f8" stop-opacity="0"/>
      </radialGradient>

      <!-- Per-card glow filters -->
      <filter id="dt-caf-0" x="-15%" y="-15%" width="130%" height="130%">
        <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#48c890" flood-opacity="0.55"/>
        <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(0,0,0,0.40)"/>
      </filter>
      <filter id="dt-caf-1" x="-15%" y="-15%" width="130%" height="130%">
        <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#b870f8" flood-opacity="0.55"/>
        <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(0,0,0,0.40)"/>
      </filter>
      <filter id="dt-caf-2" x="-15%" y="-15%" width="130%" height="130%">
        <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#f8c832" flood-opacity="0.55"/>
        <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(0,0,0,0.40)"/>
      </filter>
      <filter id="dt-caf-3" x="-15%" y="-15%" width="130%" height="130%">
        <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#28c8f0" flood-opacity="0.55"/>
        <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(0,0,0,0.40)"/>
      </filter>
      <filter id="dt-caf-4" x="-15%" y="-15%" width="130%" height="130%">
        <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#e84878" flood-opacity="0.55"/>
        <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(0,0,0,0.40)"/>
      </filter>
      <filter id="dt-caf-5" x="-15%" y="-15%" width="130%" height="130%">
        <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#6898f8" flood-opacity="0.55"/>
        <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(0,0,0,0.40)"/>
      </filter>

      <!-- Soft fill under arc -->
      <linearGradient id="dt-fill-g" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="rgba(255,215,90,0.07)" />
        <stop offset="100%" stop-color="rgba(0,0,0,0)" />
      </linearGradient>

      <!-- Sun radial gradient — season-tinted via activeIdx -->
      <radialGradient id="dt-sun-rg" cx="50%" cy="38%" r="62%">
        <stop offset="0%" stop-color="#fffee0" />
        <stop offset="36%" [attr.stop-color]="sunInnerColor()" />
        <stop offset="100%" [attr.stop-color]="sunOuterColor()" stop-opacity="0.04" />
      </radialGradient>

      <!-- Moon radial gradient — season-tinted -->
      <radialGradient id="dt-moon-rg" cx="42%" cy="36%" r="60%">
        <stop offset="0%" [attr.stop-color]="moonInnerColor()" />
        <stop offset="48%" [attr.stop-color]="moonMidColor()" />
        <stop offset="100%" [attr.stop-color]="moonOuterColor()" stop-opacity="0.04" />
      </radialGradient>

      <!-- Arc glow filter -->
      <filter id="dt-arc-glow" x="-2%" y="-80%" width="104%" height="260%">
        <feGaussianBlur stdDeviation="3.5" result="g" />
        <feMerge>
          <feMergeNode in="g" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>

      <!-- Sun bloom -->
      <filter id="dt-sun-f" x="-140%" y="-140%" width="380%" height="380%">
        <feGaussianBlur stdDeviation="20" result="b" />
        <feMerge>
          <feMergeNode in="b" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>

      <!-- Moon bloom -->
      <filter id="dt-moon-f" x="-120%" y="-120%" width="340%" height="340%">
        <feGaussianBlur stdDeviation="14" result="mb" />
        <feMerge>
          <feMergeNode in="mb" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>

      <!-- Card drop-shadow -->
      <filter id="dt-card-f" x="-12%" y="-10%" width="124%" height="132%">
        <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(0,0,0,0.35)" />
      </filter>

      <!-- Active card extra glow -->
      <filter id="dt-card-active-f" x="-14%" y="-12%" width="128%" height="136%">
        <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="rgba(255,180,80,0.30)" />
        <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(0,0,0,0.38)" />
      </filter>
    </defs>

    <!-- Soft fill below arc -->
    <path [attr.d]="arcFill" fill="url(#dt-fill-g)" />

    <!-- Arc line with glow -->
    <path [attr.d]="arcPath" fill="none" stroke="url(#dt-arc-g)" stroke-width="3"
      stroke-linecap="round" filter="url(#dt-arc-glow)" />

    <!-- ── Cards loop ── -->
    @for (card of cards; track card.arcT; let i = $index) {

    <!-- Dashed stem from arc dot down to card top -->
    <line [attr.x1]="layouts[i].cx" [attr.y1]="layouts[i].dotY"
      [attr.x2]="layouts[i].cx" [attr.y2]="layouts[i].cardY"
      stroke="rgba(255,255,255,0.38)" stroke-width="1.5" stroke-dasharray="3 4" />

    <!-- Card background rect -->
    <rect [attr.x]="layouts[i].cardX" [attr.y]="layouts[i].cardY"
      [attr.width]="CW" [attr.height]="CH" rx="16" ry="16"
      [attr.fill]="cardBg(i)" [attr.stroke]="cardBorder(i)" stroke-width="1.5"
      [attr.filter]="isActive(i) ? 'url(#dt-caf-'+i+')' : 'url(#dt-card-f)'" class="dt-card-rect"
      (click)="clickCard(i)" (mouseenter)="hoverCard(true)" (mouseleave)="hoverCard(false)" />

    <!-- Per-card radial color glow overlay at card bottom -->
    <rect [attr.x]="layouts[i].cardX" [attr.y]="layouts[i].cardY"
      [attr.width]="CW" [attr.height]="CH" rx="16" ry="16"
      [attr.fill]="'url(#dt-cg-'+i+')'" pointer-events="none" opacity="0.55" />

    <!-- Colored bottom accent line -->
    <line [attr.x1]="layouts[i].cardX + 28" [attr.y1]="layouts[i].cardY + CH - 10"
      [attr.x2]="layouts[i].cardX + CW - 28" [attr.y2]="layouts[i].cardY + CH - 10"
      [attr.stroke]="cardBorder(i)" stroke-width="2.5" stroke-linecap="round"
      [attr.filter]="'url(#dt-caf-'+i+')'" opacity="0.85" class="dt-accent-line" />

    <!-- Icon circle -->
    <circle [attr.cx]="layouts[i].cx" [attr.cy]="layouts[i].cardY + IR + 16"
      [attr.r]="IR" [attr.fill]="'rgba(0,0,0,0.22)'"
      [attr.stroke]="cardBorder(i)" stroke-width="1.8" class="dt-icon-ring" />

    <!-- Season image inside icon circle -->
    <clipPath [attr.id]="'dt-clip-'+i">
      <circle [attr.cx]="layouts[i].cx" [attr.cy]="layouts[i].cardY + IR + 16" [attr.r]="IR - 2" />
    </clipPath>
    <image
      [attr.x]="layouts[i].cx - IR + 2"
      [attr.y]="layouts[i].cardY + 18"
      [attr.width]="(IR - 2) * 2"
      [attr.height]="(IR - 2) * 2"
      [attr.href]="card.img"
      [attr.clip-path]="'url(#dt-clip-'+i+')'"
      preserveAspectRatio="xMidYMid slice" />

    <foreignObject [attr.x]="layouts[i].cardX" [attr.y]="layouts[i].cardY + IR*2 + 24"
      [attr.width]="CW" [attr.height]="CH - IR*2 - 30" class="dt-fo"
      (click)="clickCard(i)" (mouseenter)="hoverCard(true)" (mouseleave)="hoverCard(false)">
      <div xmlns="http://www.w3.org/1999/xhtml" class="dt-inner">
        <span class="dt-t-time" [style.color]="timeColor()">{{ card.time }}</span>
        <span class="dt-t-sans" [style.color]="subColor()">{{ card.sanskrit }}</span>
        <strong class="dt-t-eng" [style.color]="titleColor(i)">{{ card.english }}</strong>
        <span class="dt-t-desc" [style.color]="subColor()">{{ card.desc }}</span>
      </div>
    </foreignObject>

    <!-- Arc dot -->
    <circle [attr.cx]="layouts[i].cx" [attr.cy]="layouts[i].dotY"
      [attr.r]="dotR(i)" [attr.fill]="dotFill(i)"
      [attr.stroke]="isActive(i) ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.58)'"
      stroke-width="1.8" class="dt-dot" />
    }

    <!-- SUN — always visible -->
    <g filter="url(#dt-sun-f)">
      <circle [attr.cx]="sunX()" [attr.cy]="sunY()" [attr.r]="62 * sunGlow()" fill="rgba(255,200,28,0.07)" />
      <circle [attr.cx]="sunX()" [attr.cy]="sunY()" [attr.r]="42 * sunGlow()" fill="rgba(255,215,48,0.14)" />
      <circle [attr.cx]="sunX()" [attr.cy]="sunY()" r="24" fill="url(#dt-sun-rg)" class="dt-sun" />
      <circle [attr.cx]="sunX()" [attr.cy]="sunY()" r="12" fill="#fffee0" opacity="0.84" />
      <g [attr.stroke]="'#e8c030'" stroke-linecap="round">
        <line [attr.x1]="sunX()" [attr.y1]="sunY()-30" [attr.x2]="sunX()" [attr.y2]="sunY()-40" stroke-width="2.6" />
        <line [attr.x1]="sunX()" [attr.y1]="sunY()+30" [attr.x2]="sunX()" [attr.y2]="sunY()+40" stroke-width="2.6" />
        <line [attr.x1]="sunX()-30" [attr.y1]="sunY()" [attr.x2]="sunX()-40" [attr.y2]="sunY()" stroke-width="2.6" />
        <line [attr.x1]="sunX()+30" [attr.y1]="sunY()" [attr.x2]="sunX()+40" [attr.y2]="sunY()" stroke-width="2.6" />
        <line [attr.x1]="sunX()-21" [attr.y1]="sunY()-21" [attr.x2]="sunX()-28" [attr.y2]="sunY()-28" stroke-width="2.0" />
        <line [attr.x1]="sunX()+21" [attr.y1]="sunY()+21" [attr.x2]="sunX()+28" [attr.y2]="sunY()+28" stroke-width="2.0" />
        <line [attr.x1]="sunX()+21" [attr.y1]="sunY()-21" [attr.x2]="sunX()+28" [attr.y2]="sunY()-28" stroke-width="2.0" />
        <line [attr.x1]="sunX()-21" [attr.y1]="sunY()+21" [attr.x2]="sunX()-28" [attr.y2]="sunY()+28" stroke-width="2.0" />
      </g>
    </g>

  </svg>

  <!-- ─── MOBILE: vertical HTML timeline ─── -->
  <div class="dt-mobile">

    <!-- Vertical gradient line -->
    <div class="dt-mobile__line"></div>

    <!-- Traveling celestial body (sun only) -->
    <div class="dt-mobile__celestial" [style.top]="'calc(' + mobilePct() + '% - 24px)'">
      <div class="dt-mobile__sun-glow"></div>
      <!-- Sun -->
      <svg class="dt-mobile__sun-svg" viewBox="0 0 60 60">
        <circle cx="30" cy="30" r="28" fill="rgba(255,200,28,0.10)"/>
        <circle cx="30" cy="30" r="20" fill="rgba(255,215,48,0.18)"/>
        <circle cx="30" cy="30" r="13" fill="#ffe860"/>
        <circle cx="30" cy="30" r="7"  fill="#fffee0"/>
        <g stroke="#e8c030" stroke-linecap="round" stroke-width="2">
          <line x1="30" y1="2"  x2="30" y2="8"/>
          <line x1="30" y1="52" x2="30" y2="58"/>
          <line x1="2"  y1="30" x2="8"  y2="30"/>
          <line x1="52" y1="30" x2="58" y2="30"/>
          <line x1="10" y1="10" x2="15" y2="15"/>
          <line x1="45" y1="45" x2="50" y2="50"/>
          <line x1="50" y1="10" x2="45" y2="15"/>
          <line x1="10" y1="50" x2="15" y2="45"/>
        </g>
      </svg>
    </div>

    <!-- Cards -->
    @for (card of cards; track card.arcT; let i = $index) {
    <div class="dt-mobile__row" [class.dt-mobile__row--active]="isActive(i)" (click)="clickCard(i)">

      <!-- Time + dot column -->
      <div class="dt-mobile__left">
        <span class="dt-mobile__time" [style.color]="mobileAccent(i)">{{ card.time }}</span>
        <span class="dt-mobile__dot" [style.--mc]="mobileAccent(i)"
              [class.dt-mobile__dot--active]="isActive(i)"></span>
      </div>

      <!-- Card -->
      <div class="dt-mobile__card"
           [style.--mc]="mobileAccent(i)"
           [style.background]="mobileBg(i)"
           [style.border-color]="mobileBorder(i)">
        <!-- Season image circle -->
        <div class="dt-mobile__icon"
             [style.border-color]="mobileAccent(i)"
             [style.background]="'rgba(0,0,0,0.22)'"
             [style.overflow]="'hidden'"
             [style.padding]="'0'">
          <img [src]="card.img" [alt]="card.english"
               style="width:100%;height:100%;object-fit:cover;display:block;border-radius:50%" />
        </div>

        <!-- Text content -->
        <div class="dt-mobile__text">
          <span class="dt-mobile__sanskrit" [style.color]="mobileSub(i)">{{ card.sanskrit }}</span>
          <strong class="dt-mobile__english" [style.color]="mobileTitle(i)">{{ card.english }}</strong>
          <p class="dt-mobile__desc" [style.color]="mobileSub(i)">{{ card.desc }}</p>
        </div>

        <!-- Bottom accent line -->
        <span class="dt-mobile__accent-bar" [style.background]="mobileAccent(i)"></span>
      </div>

    </div>
    }

  </div>

</section>
