<section class="wg-root" aria-labelledby="wg-title">

  <header class="wg-head">
    <p class="wg-eyebrow">Workshops &amp; programs</p>
    <div id="wg-title" class="wg-title">Gallery</div>
  </header>

  <div class="wg-stage"
       (mouseenter)="onHover(true)"
       (mouseleave)="onHover(false)">

    <!-- Viewport — clips the auto-scrolling marquee track -->
    <div class="wg-viewport" #viewport>
      <div class="wg-track" #track [style.transform]="trackTransform()">
        @for (img of loopImages(); track i; let i = $index) {
          <div class="wg-slot">
            <div class="wg-card-frame" (click)="openLightbox(i)">
              <!-- Outer halo / beam border -->
              <div class="wg-card-halo">
                <div class="wg-card-beam"></div>
                <div class="wg-card-halo__mask"></div>
              </div>
              <!-- Inner image -->
              <div class="wg-card-inner">
                <img class="wg-card-img"
                     [src]="img.src"
                     [alt]="img.alt"
                     loading="lazy"
                     draggable="false"/>
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  </div>

  <!-- ── Lightbox preview ── -->
  @if (lightboxOpen()) {
    <div class="wg-lb" role="dialog" aria-modal="true" aria-label="Image preview"
         (click)="closeLightbox()">

      <!-- <button class="wg-lb__close" type="button" aria-label="Close preview"
              (click)="stopProp($event); closeLightbox()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
          <line x1="6" y1="6" x2="18" y2="18"/>
          <line x1="18" y1="6" x2="6" y2="18"/>
        </svg>
        <span>Close</span>
      </button> -->

      <figure class="wg-lb__figure" (click)="stopProp($event)">
        <img class="wg-lb__img" [src]="lightboxImg()" alt="Preview" draggable="false"/>
      </figure>
    </div>
  }
</section>
