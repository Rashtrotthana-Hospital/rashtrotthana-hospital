<!-- RIGHT SIDE: 3D Lotus Flower Candle — premium cinematic wellness illustration -->
<div class="hb-stage" aria-hidden="true">

  <!-- Soft background wash -->
  <div class="hb-bg">
    <span class="hb-bg__wash"></span>
    <span class="hb-bg__inner-glow"></span>
  </div>

  <!-- Multiple transparent glowing orbit circles behind the candle -->
  <div class="hb-orbits" aria-hidden="true">
    <span class="hb-orbit hb-orbit--1"></span>
    <span class="hb-orbit hb-orbit--2"></span>
    <span class="hb-orbit hb-orbit--3"></span>
    <span class="hb-orbit hb-orbit--4"></span>
  </div>

  <!-- Floating golden particles around the flower -->
  <div class="hb-particles" aria-hidden="true">
    @for (p of particles; track $index) {
    <span class="hb-particle"
          [style.left.%]="p.x"
          [style.top.%]="p.y"
          [style.width.px]="p.size"
          [style.height.px]="p.size"
          [style.animation-delay]="p.delay + 's'"
          [style.animation-duration]="p.duration + 's'"></span>
    }
  </div>

  <!-- Video -->
  <div class="hb-float-wrap">

      class="hb-video"

</div>
